<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dialog Test</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">


    <style>
        body {
            padding: 50px;
        }
    </style>
</head>
<body>

    <h2>Dialog Demo</h2>

    <!-- Buttons to test -->
    <button class="btn btn-primary" onclick="simpleDialog()">Simple Dialog</button>
    <button class="btn btn-danger" onclick="confirmDialog()">Confirm Dialog</button>

    <!-- Hidden Template Modal -->
    <div id="dummy-dialog-modal" class="modal fade">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title"></h5>
                    <small class="modal-subtitle text-muted"></small>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body"></div>

                <div class="modal-footer"></div>

            </div>
        </div>
    </div>

    <!-- Container for cloned modals -->
    <div id="modalsGarbage"></div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>    


    <!-- Your Dialog Class -->
    <script src="script.js"></script>

    <!-- Usage Code -->
    <script>
        function simpleDialog() {
            dialog("Hello 👋", "This is a simple dialog!");
        }

        function confirmDialog() {
            display_dialog("Delete", "Are you sure you want to delete?", function () {
                alert("Deleted!");
            });
        }
    </script>

</body>
</html>
